# Docker Compose for the Asterisk × Alpine build matrix.
# Each builder-<line> service is the same template (docker/builder.Dockerfile)
# built with a per-line ALPINE_VERSION build-arg and mounting its own
# packages/<line>/ APKBUILD tree at /home/builder/main/asterisk (so abuild's
# $repo resolves to "main" and packages land in packages/main/<arch>/).
# Outputs land in repository/<alpine>/main/<arch>/ via REPODEST.
#
# Add a line: (1) add a stanza here, (2) drop APKBUILD+patches in packages/<line>/,
# (3) record it in buildchain/versions.mk.

x-builder-common: &builder-common
  build:
    context: .
    dockerfile: docker/builder.Dockerfile
  command: /bin/sh
  stdin_open: true
  tty: true

x-builder-volumes: &builder-volumes
  - ./repository:/home/builder/packages:rw
  - ./keys:/home/builder/.abuild:rw
  - ./scripts:/home/builder/scripts:ro

services:
  # ---- modern tier (Alpine 3.24, OpenSSL 3) ----
  builder-23:
    <<: *builder-common
    build:
      context: .
      dockerfile: docker/builder.Dockerfile
      args:
        ALPINE_VERSION: "3.24"
    volumes:
      - ./packages/23:/home/builder/main/asterisk:rw
      - ./repository:/home/builder/packages:rw
      - ./keys:/home/builder/.abuild:rw
      - ./scripts:/home/builder/scripts:ro
    working_dir: /home/builder/main/asterisk

  builder-git:
    <<: *builder-common
    build:
      context: .
      dockerfile: docker/builder.Dockerfile
      args:
        ALPINE_VERSION: "3.24"
    volumes:
      - ./packages/git:/home/builder/main/asterisk:rw
      - ./repository:/home/builder/packages:rw
      - ./keys:/home/builder/.abuild:rw
      - ./scripts:/home/builder/scripts:ro
    working_dir: /home/builder/main/asterisk

