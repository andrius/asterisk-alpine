  # ---- runtime (test) ----
  asterisk:
    build:
      context: .
      dockerfile: docker/asterisk.Dockerfile
    ports:
      - "5060:5060/udp"
      - "5061:5061/tcp"
      - "10000-10099:10000-10099/udp"
    volumes:
      - asterisk-config:/etc/asterisk
      - asterisk-data:/var/lib/asterisk
      - asterisk-logs:/var/log/asterisk
      - asterisk-spool:/var/spool/asterisk
    restart: unless-stopped
    profiles:
      - runtime

  repository:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./repository:/usr/share/nginx/html:ro
    profiles:
      - repository

volumes:
  asterisk-config:
  asterisk-data:
  asterisk-logs:
  asterisk-spool:
