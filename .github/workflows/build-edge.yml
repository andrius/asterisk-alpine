name: build-edge

# Weekly canary: build + smoke-test the newest Asterisk lines - LTS 22, dev 23,
# git (master) - on Alpine EDGE for x86_64 + aarch64. Surfaces musl / toolchain
# / base-image breakage on edge before it ships in stable Alpine. Implements #8
# (absorbs #4 Stage 3, git edge).
#
# PUBLISHED: the `publish` job below pushes these to the Cloudsmith `alpine/edge`
# distribution, installable via the @andrius-asterisk-edge pin tag (README).
# Edge became a published registry on 2026-07-15, superseding the earlier
# canary-only/not-published design - if you are here because a comment said
# "not published", that comment was stale and is now corrected.

on:
  schedule:
    - cron: "43 4 * * 1"   # weekly Mon ~04:43 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-edge
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { line: "22", arch: x86_64,  runner: ubuntu-latest }
          - { line: "22", arch: aarch64, runner: ubuntu-24.04-arm }
          - { line: "23", arch: x86_64,  runner: ubuntu-latest }
          - { line: "23", arch: aarch64, runner: ubuntu-24.04-arm }
          - { line: git,  arch: x86_64,  runner: ubuntu-latest }
          - { line: git,  arch: aarch64, runner: ubuntu-24.04-arm }
    uses: ./.github/workflows/_build.yml
    with:
      line: ${{ matrix.line }}
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      platform: ''
      allow_fail: true
      alpine_version: edge
    secrets: inherit

  publish:
    needs: build
    uses: ./.github/workflows/_publish.yml
    with:
      alpine_version: edge
    secrets: inherit
