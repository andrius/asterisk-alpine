name: build

# Reusable builder for ONE matrix leg (line x arch). Called from ci.yml's
# build job under its strategy.matrix. Stage 1 of the reusable-workflow
# refactor: this is the ci.yml build job verbatim, with matrix.* -> inputs.*.

on:
  workflow_call:
    inputs:
      line:
        required: true
        type: string
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      platform:
        required: false
        type: string
        default: ''
      allow_fail:
        required: false
        type: boolean
        default: false
      alpine_version:
        required: false
        type: string
        default: 'v3.24'
    secrets:
      ABUILD_PRIVATE_KEY:
        required: true
      ABUILD_KEY_NAME:
        required: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    continue-on-error: ${{ inputs.allow_fail }}
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
      ALPINE_VERSION: ${{ inputs.alpine_version }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU (emulated arches only)
        if: inputs.platform != ''
        uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Install signing key
        run: ./scripts/ci-install-signing-key.sh
      - name: Make bind-mounted dirs writable by the container builder
        run: |
          mkdir -p repository/${{ inputs.alpine_version }}/main/${{ inputs.arch }}
          sudo chmod -R a+rwX packages repository keys
      - name: Build ${{ inputs.line }} (${{ inputs.arch }})
        run: make build-${{ inputs.line }} ARCH=${{ inputs.arch }}
      - name: Smoke test ${{ inputs.line }} (${{ inputs.arch }})
        run: make test-${{ inputs.line }} ARCH=${{ inputs.arch }}
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apks-${{ inputs.arch }}-${{ inputs.line }}
          path: repository/${{ inputs.alpine_version }}/main/${{ inputs.arch }}/*.apk
          if-no-files-found: error
      - name: Upload git APKBUILD (for the daily pin commit)
        if: inputs.line == 'git' && inputs.arch == 'x86_64'
        uses: actions/upload-artifact@v7
        with:
          name: git-apkbuild
          path: packages/git/APKBUILD
          if-no-files-found: error
