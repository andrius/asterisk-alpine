name: build-git-daily

# Daily build of the Asterisk master ("git") snapshot for Alpine 3.24, SKIPPED
# when upstream master is unchanged since the last build. Implements #4
# (Stage 2) on the reusable-workflow foundation: calls _build.yml + _publish.yml.
# Publish prunes older _git snapshots (replace, not accumulate) and the new pin
# (_gitrev/pkgver/sha512sums) is committed back to main as the skip baseline.
# Stage 3 adds an Alpine-edge canary leg.

on:
  schedule:
    - cron: "13 6 * * *"   # ~06:13 UTC daily, off the round hour
  workflow_dispatch:        # manual trigger forces a build (ignores the skip)

permissions:
  contents: read

concurrency:
  group: git-daily
  cancel-in-progress: false   # never cancel a run already building

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.c.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
      - id: c
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch; building regardless of skip"
            exit 0
          fi
          CURRENT=$(git ls-remote https://github.com/asterisk/asterisk.git refs/heads/master | awk '{print $1}')
          PINNED=$(grep '^_gitrev=' packages/git/APKBUILD | cut -d= -f2)
          echo "current master: $CURRENT"
          echo "last-built pin: $PINNED"
          if [ "$CURRENT" = "$PINNED" ]; then
            echo "master unchanged since last build; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: skip-check
    if: needs.skip-check.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    uses: ./.github/workflows/_build.yml
    with:
      line: git
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      platform: ''
      allow_fail: true       # master is volatile; a broken leg is red but does not fail the run
    secrets: inherit

  publish:
    needs: [skip-check, build]
    if: needs.skip-check.outputs.skip != 'true'
    uses: ./.github/workflows/_publish.yml
    secrets: inherit

  commit-pin:
    needs: [skip-check, publish]
    if: needs.skip-check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download the build's updated git APKBUILD
        uses: actions/download-artifact@v8
        with:
          name: git-apkbuild
          path: packages/git
        continue-on-error: true   # absent if the git build failed -> no-op below
      - name: Commit and push the new pin
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # The APKBUILD remains the trigger: if the build did not refresh the
          # pin there is nothing to record.
          git add packages/git/APKBUILD
          if git diff --cached --quiet; then
            echo "no pin change to commit (build did not refresh the APKBUILD)"
            exit 0
          fi

          # Keep buildchain/versions.mk in step with the pin we just took.
          # Nothing else writes that file, so without this its git row drifts
          # every time this workflow runs and `make list` reports a snapshot
          # that is no longer built.
          PKGVER=$(sed -n 's/^pkgver=//p' packages/git/APKBUILD | head -1)
          GITREV=$(sed -n 's/^_gitrev=//p' packages/git/APKBUILD | head -1)
          SHORT=$(printf '%s' "$GITREV" | cut -c1-8)
          if [ -z "$PKGVER" ] || [ -z "$SHORT" ]; then
            echo "::error::could not read pkgver/_gitrev from packages/git/APKBUILD"
            exit 1
          fi

          awk -v v="$PKGVER" -v s="$SHORT" '
            $1=="git" && $0 !~ /^#/ {
              printf "%-8s %-19s %-6s %-8s %s\n", $1, v, $3, $4, "ok:master-snapshot-" s
              next
            }
            { print }
          ' buildchain/versions.mk > versions.mk.new
          mv versions.mk.new buildchain/versions.mk

          if ! grep -q "^git .*${PKGVER}.*master-snapshot-${SHORT}" buildchain/versions.mk; then
            echo "::error::versions.mk git row did not update as expected"
            exit 1
          fi
          echo "versions.mk git row -> ${PKGVER} (master-snapshot-${SHORT})"

          git add buildchain/versions.mk
          git commit -m "git line: pin master snapshot [skip ci]"
          git push
