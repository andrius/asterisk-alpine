name: publish

# Cloudsmith-only publisher: download the built APKs and push them to the
# Open-Source Cloudsmith repo asterisk/alpine as Alpine distribution
# alpine/$ALPINE_VERSION (v3.24 or edge). Cloudsmith owns indexing, signing,
# CDN and retention - so there is no APKINDEX build, no signing key, and no
# GitHub Pages deploy.

on:
  workflow_call:
    inputs:
      alpine_version:
        required: false
        type: string
        default: 'v3.24'
    secrets:
      CLOUDSMITH_API_KEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: ${{ inputs.alpine_version }}
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_OWNER: asterisk
      CLOUDSMITH_REPO: alpine
    steps:
      - name: Check out the prune script
        # This job otherwise only consumes build artifacts, but the post-publish
        # prune step needs scripts/prune-git-snapshots.sh from the repo. Sparse
        # checkout keeps it to just that path. Runs first so download-artifact's
        # _artifacts/ tree (added afterwards) is untouched.
        uses: actions/checkout@v7
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false
      - name: Collect built APKs
        uses: actions/download-artifact@v8
        with:
          pattern: apks-*
          path: _artifacts
      - name: Push APKs to Cloudsmith (alpine/${{ inputs.alpine_version }})
        run: |
          pipx install cloudsmith-cli >/dev/null
          # ALPINE_VERSION is 'v3.24' or 'edge' and maps 1:1 to the Cloudsmith
          # Alpine release, so the distribution path is alpine/$ALPINE_VERSION.
          dist="alpine/$ALPINE_VERSION"
          pushed=0
          # --republish REPLACES a package that already exists at the same
          # name+version+arch+distro instead of creating a duplicate. WITHOUT it,
          # `cloudsmith push` still exits 0 for a duplicate, but Cloudsmith FAILS
          # that copy during server-side sync ("Replace Package w/ Same Version
          # was not enabled"). Failed copies are never served (404) yet still
          # pollute the index and shadow the good copy at the apk path - so every
          # re-run (push to main, weekly rebuild) silently broke downloads. With
          # --republish, re-runs and any noarch subpackage built in >1 arch leg
          # (pushed once per leg) are idempotent. Cloudsmith reads each package's
          # arch from its own metadata, so per-arch packages still coexist.
          push_one() {
            local file="$1"
            if cloudsmith push alpine \
                 "$CLOUDSMITH_OWNER/$CLOUDSMITH_REPO/$dist" \
                 "$file" --republish --no-wait-for-sync; then
              pushed=$((pushed + 1)); echo "pushed: $(basename "$file")"
            else
              echo "FAILED: $file" >&2; return 1
            fi
          }
          shopt -s nullglob
          for f in _artifacts/apks-*/*.apk; do push_one "$f"; done
          [ "$pushed" -gt 0 ] || { echo "no .apk artifacts found" >&2; exit 1; }
          echo "Cloudsmith ($dist): pushed=$pushed"
      - name: Prune superseded git snapshots (this distribution only)
        # The git line republishes a fresh 24.0.0_git<date> on every master
        # change; nothing removed the previous one (Cloudsmith retention is a
        # paid feature, 402 on the OSS plan), so snapshots accumulated ~31
        # packages per build. This keeps only the newest per distribution.
        # Release lines are never touched - only "_git" versions are eligible.
        # Non-fatal: a prune hiccup must not fail an otherwise-good publish.
        continue-on-error: true
        env:
          KEEP_GIT_SNAPSHOTS: '1'
        run: |
          KEEP="$KEEP_GIT_SNAPSHOTS" \
            sh scripts/prune-git-snapshots.sh
