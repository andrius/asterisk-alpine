name: publish

# Cloudsmith-only publisher: download the built APKs and push them to the
# Open-Source Cloudsmith repo asterisk/alpine as Alpine distribution
# alpine/$ALPINE_VERSION (v3.24 or edge). Cloudsmith owns indexing, signing,
# CDN and retention - so there is no APKINDEX build, no signing key, and no
# GitHub Pages deploy.

on:
  workflow_call:
    inputs:
      alpine_version:
        required: false
        type: string
        default: 'v3.24'
    secrets:
      CLOUDSMITH_API_KEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: ${{ inputs.alpine_version }}
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_OWNER: asterisk
      CLOUDSMITH_REPO: alpine
    steps:
      - name: Collect built APKs
        uses: actions/download-artifact@v8
        with:
          pattern: apks-*
          path: _artifacts
      - name: Push APKs to Cloudsmith (alpine/${{ inputs.alpine_version }})
        run: |
          pipx install cloudsmith-cli >/dev/null
          # ALPINE_VERSION is 'v3.24' or 'edge' and maps 1:1 to the Cloudsmith
          # Alpine release, so the distribution path is alpine/$ALPINE_VERSION.
          dist="alpine/$ALPINE_VERSION"
          pushed=0 skipped=0
          push_one() {
            local file="$1" out
            if out=$(cloudsmith push alpine \
                       "$CLOUDSMITH_OWNER/$CLOUDSMITH_REPO/$dist" \
                       "$file" --no-wait-for-sync 2>&1); then
              pushed=$((pushed + 1)); echo "pushed: $(basename "$file")"
            elif printf '%s' "$out" | grep -qiE 'already exists|already present|has already been|duplicate|conflict'; then
              skipped=$((skipped + 1)); echo "skip:   $(basename "$file") (already on Cloudsmith)"
            else
              echo "$out" >&2; echo "FAILED: $file" >&2; return 1
            fi
          }
          # Cloudsmith reads each package's arch from its metadata, so per-arch
          # packages coexist; a noarch subpackage built in >1 arch leg is a
          # duplicate and is skipped.
          shopt -s nullglob
          for f in _artifacts/apks-*/*.apk; do push_one "$f"; done
          [ $((pushed + skipped)) -gt 0 ] || { echo "no .apk artifacts found" >&2; exit 1; }
          echo "Cloudsmith ($dist): pushed=$pushed skipped=$skipped"
