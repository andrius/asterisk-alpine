name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tier:
        description: Tier to build
        type: choice
        options: [modern, full]
        default: full
  schedule:
    # Weekly Mon ~04:23 UTC: rebuild + publish every line so base-image bumps,
    # dependency and abuild updates roll out without a manual dispatch. Routes
    # to the full tier (the else branch in setup.pick).
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      publish: ${{ steps.pick.outputs.publish }}
      tier: ${{ steps.pick.outputs.tier }}
    steps:
      - id: pick
        run: |
          EVENT='${{ github.event_name }}'
          INPUT_TIER='${{ github.event.inputs.tier }}'
          REF='${{ github.ref }}'
          if [ "$EVENT" = "pull_request" ]; then
            TIER=modern; PUBLISH=false
          elif [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            TIER=modern; PUBLISH=true
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "$INPUT_TIER" = "modern" ]; then
            TIER=modern; PUBLISH=true
          else
            TIER=full; PUBLISH=true
          fi

          if [ "$TIER" = "modern" ]; then
            LINES='["20","22","22-cert","23"]'
          else
            LINES='["23","22","22-cert","20","18","16"]'
          fi

          # Native arches build every tier line.
          NATIVE=$(echo "$LINES" | jq -c '[ .[] as $l |
            {line:$l, arch:"x86_64",  runner:"ubuntu-latest",    platform:"", allow_fail:false},
            {line:$l, arch:"aarch64", runner:"ubuntu-24.04-arm", platform:"", allow_fail:false} ]')

          # 32-bit arches: full tier only, lines 22/23/22-cert, best-effort.
          if [ "$TIER" = "full" ]; then
            ARM32=$(jq -cn '[ ["22","23","22-cert"][] as $l |
              {line:$l, arch:"armv7", runner:"ubuntu-latest", platform:"linux/arm/v7", allow_fail:true},
              {line:$l, arch:"armhf", runner:"ubuntu-latest", platform:"linux/arm/v6", allow_fail:true} ]')
          else
            ARM32='[]'
          fi

          # Git (master) line: full tier only, best-effort (master is volatile),
          # native arches only. 'make build-git' runs git-snapshot.sh on the
          # runner first to pin _gitrev/pkgver/checksums, then builds.
          if [ "$TIER" = "full" ]; then
            GITLINES=$(jq -cn '[ "git" as $l |
              {line:$l, arch:"x86_64",  runner:"ubuntu-latest",    platform:"", allow_fail:true},
              {line:$l, arch:"aarch64", runner:"ubuntu-24.04-arm", platform:"", allow_fail:true} ]')
          else
            GITLINES='[]'
          fi

          # Ancient lines (1.6, 1.8): x86_64 only - not validated on aarch64.
          # Regular pipeline (every push/PR + full tier), gating.
          ANCIENT=$(jq -cn '[ ["1.8","1.6"][] as $l |
            {line:$l, arch:"x86_64", runner:"ubuntu-latest", platform:"", allow_fail:false} ]')

          INCLUDE=$(jq -cn --argjson a "$NATIVE" --argjson b "$ARM32" --argjson c "$GITLINES" --argjson d "$ANCIENT" '$a + $b + $c + $d')
          echo "matrix={\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    uses: ./.github/workflows/_build.yml
    with:
      line: ${{ matrix.line }}
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      platform: ${{ matrix.platform }}
      allow_fail: ${{ matrix.allow_fail }}
    secrets: inherit

  frontier:
    needs: setup
    if: needs.setup.outputs.tier == 'full'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        line: ["14"]
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Install signing key
        run: ./scripts/ci-install-signing-key.sh
      - name: Make bind-mounted dirs writable by the container builder
        run: |
          mkdir -p repository/v3.24/main/x86_64
          sudo chmod -R a+rwX packages repository keys
      - name: Attempt build ${{ matrix.line }} (expected to fail)
        run: make build-${{ matrix.line }}
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apks-x86_64-14
          path: repository/v3.24/main/x86_64/*.apk
          if-no-files-found: ignore

  publish:
    needs: [setup, build]
    if: needs.setup.outputs.publish == 'true'
    uses: ./.github/workflows/_publish.yml
    secrets: inherit

  notify-blog:
    # New upstream versions published -> add an entry to the andrius.mobi/asterisk
    # timeline (repository_dispatch to andrius/blog). Fires only for pushes to
    # main whose range bumps pkgver= in packages/*/APKBUILD (i.e. the discover
    # bump PRs landing), so weekly rebuilds and infra changes stay silent. The
    # daily git-line snapshot pins are [skip ci] and packages/git is excluded
    # here anyway. Skipped when BLOG_DISPATCH_TOKEN is not configured.
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect new versions and update timeline
        env:
          BLOG_DISPATCH_TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BLOG_DISPATCH_TOKEN" ]; then
            echo "::notice::BLOG_DISPATCH_TOKEN not set - skipping timeline update"
            exit 0
          fi
          if ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "::notice::before-commit unavailable (force push?) - skipping"
            exit 0
          fi
          VERSIONS=""
          for f in $(git diff --name-only "$BEFORE" "$AFTER" -- 'packages/*/APKBUILD' ':(exclude)packages/git/APKBUILD'); do
            [ -f "$f" ] || continue   # line removed in this push
            old=$(git show "$BEFORE:$f" 2>/dev/null | sed -n 's/^pkgver=//p' | head -1 || true)
            new=$(sed -n 's/^pkgver=//p' "$f" | head -1)
            if [ -n "$new" ] && [ "$new" != "$old" ]; then
              VERSIONS="$VERSIONS $new"
            fi
          done
          VERSIONS=$(echo "$VERSIONS" | xargs)
          if [ -z "$VERSIONS" ]; then
            echo "No pkgver bumps in $BEFORE..$AFTER - nothing to announce"
            exit 0
          fi
          VERSION_LIST=$(echo "$VERSIONS" | sed 's/ /, /g; s/, \([^,]*\)$/ and \1/')
          TITLE="Alpine apks for Asterisk $VERSION_LIST"
          PAYLOAD=$(jq -n --arg title "$TITLE" '{
            event_type: "asterisk-update",
            client_payload: {
              title: $title,
              url: "https://cloudsmith.io/~asterisk/repos/alpine/packages/",
              tags: "apk,alpine"
            }
          }')
          curl -sfS -X POST \
            -H "Authorization: Bearer $BLOG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/andrius/blog/dispatches \
            -d "$PAYLOAD"
          echo "Timeline entry sent: $TITLE"

  notify-consumer:
    # A fresh apk was published to Cloudsmith -> poke andrius/asterisk so its
    # alpine-sync workflow re-probes the index and opens/refreshes its PR within
    # minutes, instead of waiting for that repo's daily 22:00 UTC cron. The
    # consumer ignores client_payload (re-probes the whole index), so the payload
    # here is informational only.
    #
    # Gated only on `needs: [publish]` (NOT on push/main like notify-blog): the
    # consumer's upsert is idempotent (no drift -> no PR), so firing on EVERY
    # successful publish is both safe and more complete - it also covers full-tier
    # weekly/dispatch runs that publish the ancient 16/18 lines, which the
    # push-to-main modern tier never builds. On PRs `publish` is skipped, so this
    # is skipped too. Skipped when ASTERISK_DISPATCH_TOKEN is unset, so forks and
    # unconfigured environments stay silent.
    #
    # ASTERISK_DISPATCH_TOKEN: a PAT with contents:write on andrius/asterisk
    # (a fine-grained PAT scoped to that one repo, Contents: read and write; the
    # default GITHUB_TOKEN cannot trigger events in another repo).
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch alpine-published to andrius/asterisk
        env:
          ASTERISK_DISPATCH_TOKEN: ${{ secrets.ASTERISK_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ASTERISK_DISPATCH_TOKEN:-}" ]; then
            echo "::notice::ASTERISK_DISPATCH_TOKEN not set - skipping alpine-sync dispatch"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
               event_type: "alpine-published",
               client_payload: { source: "andrius/asterisk-alpine", run_url: $run }
             }')
          curl -sfS -X POST \
            -H "Authorization: Bearer $ASTERISK_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/andrius/asterisk/dispatches \
            -d "$PAYLOAD"
          echo "Dispatched alpine-published to andrius/asterisk"
