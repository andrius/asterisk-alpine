name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tier:
        description: Tier to build
        type: choice
        options: [modern, full]
        default: full

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      publish: ${{ steps.pick.outputs.publish }}
      tier: ${{ steps.pick.outputs.tier }}
    steps:
      - id: pick
        run: |
          EVENT='${{ github.event_name }}'
          INPUT_TIER='${{ github.event.inputs.tier }}'
          REF='${{ github.ref }}'
          if [ "$EVENT" = "pull_request" ]; then
            TIER=modern; PUBLISH=false
          elif [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            TIER=modern; PUBLISH=true
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "$INPUT_TIER" = "modern" ]; then
            TIER=modern; PUBLISH=true
          else
            TIER=full; PUBLISH=true
          fi

          if [ "$TIER" = "modern" ]; then
            LINES='["20","22","22-cert","23"]'
          else
            LINES='["23","22","22-cert","20","18","16"]'
          fi

          # Native arches build every tier line.
          NATIVE=$(echo "$LINES" | jq -c '[ .[] as $l |
            {line:$l, arch:"x86_64",  runner:"ubuntu-latest",    platform:"", allow_fail:false},
            {line:$l, arch:"aarch64", runner:"ubuntu-24.04-arm", platform:"", allow_fail:false} ]')

          # 32-bit arches: full tier only, lines 22/23/22-cert, best-effort.
          if [ "$TIER" = "full" ]; then
            ARM32=$(jq -cn '[ ["22","23","22-cert"][] as $l |
              {line:$l, arch:"armv7", runner:"ubuntu-latest", platform:"linux/arm/v7", allow_fail:true},
              {line:$l, arch:"armhf", runner:"ubuntu-latest", platform:"linux/arm/v6", allow_fail:true} ]')
          else
            ARM32='[]'
          fi

          # Git (master) line: full tier only, best-effort (master is volatile),
          # native arches only. 'make build-git' runs git-snapshot.sh on the
          # runner first to pin _gitrev/pkgver/checksums, then builds.
          if [ "$TIER" = "full" ]; then
            GITLINES=$(jq -cn '[ "git" as $l |
              {line:$l, arch:"x86_64",  runner:"ubuntu-latest",    platform:"", allow_fail:true},
              {line:$l, arch:"aarch64", runner:"ubuntu-24.04-arm", platform:"", allow_fail:true} ]')
          else
            GITLINES='[]'
          fi

          # Ancient lines (1.6, 1.8): x86_64 only - not validated on aarch64.
          # Regular pipeline (every push/PR + full tier), gating.
          ANCIENT=$(jq -cn '[ ["1.8","1.6"][] as $l |
            {line:$l, arch:"x86_64", runner:"ubuntu-latest", platform:"", allow_fail:false} ]')

          INCLUDE=$(jq -cn --argjson a "$NATIVE" --argjson b "$ARM32" --argjson c "$GITLINES" --argjson d "$ANCIENT" '$a + $b + $c + $d')
          echo "matrix={\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.allow_fail }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU (emulated arches only)
        if: matrix.platform != ''
        uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Install signing key
        run: ./scripts/ci-install-signing-key.sh
      - name: Make bind-mounted dirs writable by the container builder
        run: |
          mkdir -p repository/v3.24/main/${{ matrix.arch }}
          sudo chmod -R a+rwX packages repository keys
      - name: Build ${{ matrix.line }} (${{ matrix.arch }})
        run: make build-${{ matrix.line }} ARCH=${{ matrix.arch }}
      - name: Smoke test ${{ matrix.line }} (${{ matrix.arch }})
        run: make test-${{ matrix.line }} ARCH=${{ matrix.arch }}
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apks-${{ matrix.arch }}-${{ matrix.line }}
          path: repository/v3.24/main/${{ matrix.arch }}/*.apk
          if-no-files-found: error

  frontier:
    needs: setup
    if: needs.setup.outputs.tier == 'full'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        line: ["14"]
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Install signing key
        run: ./scripts/ci-install-signing-key.sh
      - name: Make bind-mounted dirs writable by the container builder
        run: |
          mkdir -p repository/v3.24/main/x86_64
          sudo chmod -R a+rwX packages repository keys
      - name: Attempt build ${{ matrix.line }} (expected to fail)
        run: make build-${{ matrix.line }}
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apks-x86_64-14
          path: repository/v3.24/main/x86_64/*.apk
          if-no-files-found: ignore

  publish:
    needs: [setup, build]
    if: needs.setup.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Install signing key
        run: ./scripts/ci-install-signing-key.sh
      - name: Collect built APKs
        uses: actions/download-artifact@v8
        with:
          pattern: apks-*
          path: _artifacts
      - name: Distribute APKs into per-arch repo dirs
        run: |
          for d in _artifacts/apks-*; do
            [ -d "$d" ] || continue
            arch=$(basename "$d" | cut -d- -f2)
            mkdir -p "repository/v3.24/main/$arch"
            cp "$d"/*.apk "repository/v3.24/main/$arch/"
          done
          echo "arches present: $(ls repository/v3.24/main)"
      - name: Seed from the live repo (merge - do not wipe existing arches/lines)
        run: |
          BASE="https://apk.andrius.mobi/v3.24/main"
          seeded=0
          for arch in x86_64 aarch64 armv7 armhf; do
            code=$(curl -sSL --retry 3 --retry-delay 3 --retry-connrefused \
              -o /tmp/idx.tar.gz -w '%{http_code}' "$BASE/$arch/APKINDEX.tar.gz" || echo 000)
            if [ "$code" = "404" ]; then
              echo "no live index for $arch (first publish or arch absent); skipping"
              continue
            elif [ "$code" != "200" ]; then
              echo "ERROR: live index for $arch returned HTTP $code; aborting to avoid wiping existing packages"
              exit 1
            fi
            mkdir -p "repository/v3.24/main/$arch"
            # Each package the live index lists: filename = P-V.apk. A:noarch
            # packages live under the shared noarch/ path on the live site; all
            # others under the arch dir. Download any this run did not rebuild
            # into the local arch dir (abuild's natural layout).
            tar -xzOf /tmp/idx.tar.gz APKINDEX 2>/dev/null | awk '
              BEGIN { RS = ""; FS = "\n" }
              {
                p = ""; v = ""; a = ""
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^P:/) p = substr($i, 3)
                  if ($i ~ /^V:/) v = substr($i, 3)
                  if ($i ~ /^A:/) a = substr($i, 3)
                }
                if (p != "") print a "\t" p "-" v ".apk"
              }' > /tmp/seed-list.txt
            while IFS="$(printf '\t')" read -r a f; do
              [ -n "$f" ] || continue
              [ -f "repository/v3.24/main/$arch/$f" ] && continue
              if [ "$a" = "noarch" ]; then src="$BASE/noarch/$f"; else src="$BASE/$arch/$f"; fi
              if curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused "$src" -o "repository/v3.24/main/$arch/$f"; then
                seeded=$((seeded + 1))
              else
                rm -f "repository/v3.24/main/$arch/$f"
                echo "  skip $arch/$f (fetch failed)"
              fi
            done < /tmp/seed-list.txt
            echo "seeded from live $arch index"
          done
          echo "total seeded files: $seeded"
      - name: Make bind-mounted dirs writable by the container builder
        run: sudo chmod -R a+rwX repository keys
      - name: Build + sign per-arch APKINDEX (shared canonical noarch)
        run: |
          docker compose build builder-23
          for arch in x86_64 aarch64 armv7 armhf; do
            [ -d "repository/v3.24/main/$arch" ] || continue
            # x86_64 is indexed first and defines the canonical noarch set
            # (build-repo-index.sh mirrors A:noarch files into main/noarch/).
            # Overlay those canonical files into each later arch dir so every
            # index references identical noarch checksums; apk serves them from
            # the shared noarch/ path.
            if [ -d repository/v3.24/main/noarch ]; then
              cp -f repository/v3.24/main/noarch/*.apk "repository/v3.24/main/$arch/" 2>/dev/null || true
            fi
            docker compose run --rm -e ALPINE_VERSION=v3.24 -e ARCH="$arch" builder-23 \
              sh /home/builder/scripts/build-repo-index.sh
          done
      - name: Assemble Pages site
        run: |
          mkdir -p _site/v3.24/main
          for arch in x86_64 aarch64 armv7 armhf noarch; do
            [ -d "repository/v3.24/main/$arch" ] && cp -r "repository/v3.24/main/$arch" _site/v3.24/main/
          done
          cp "keys/${ABUILD_KEY_NAME:-packages@asterisk-alpine.rsa}.pub" _site/
          echo "apk.andrius.mobi" > _site/CNAME
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset=utf-8>
          <meta name=viewport content="width=device-width, initial-scale=1">
          <title>Asterisk Alpine APK repository</title>
          <h1>Asterisk Alpine APK repository</h1>
          <p>Signed Alpine apk packages for multiple Asterisk versions - x86_64,
          aarch64, armv7, armhf. Source, docs and Docker examples at
          <a href="https://github.com/andrius/asterisk-alpine">github.com/andrius/asterisk-alpine</a>
          (see the <a href="https://github.com/andrius/asterisk-alpine#install">README</a>).</p>
          <h2>1. Trust the signing key</h2>
          <pre>wget -O /etc/apk/keys/packages@asterisk-alpine.rsa.pub \
            https://apk.andrius.mobi/packages@asterisk-alpine.rsa.pub</pre>
          <h2>2. Add the repository under a pin tag</h2>
          <pre>echo "@andrius-asterisk https://apk.andrius.mobi/v3.24/main" >> /etc/apk/repositories
          apk update</pre>
          <h2>3. Install the line you want (pin the version)</h2>
          <p>The <code>@andrius-asterisk</code> tag takes asterisk from this repo
          only (Alpine ships its own); <code>~</code> is a version-prefix match.</p>
          <pre>apk add "asterisk@andrius-asterisk=~23"      # 23.x  current
          apk add "asterisk@andrius-asterisk=~22"      # 22.x  LTS (22.10)
          apk add "asterisk@andrius-asterisk=~22.8"    # 22.8  certified
          apk add "asterisk@andrius-asterisk=~20"      # 20.x
          apk add "asterisk@andrius-asterisk=~18"      # 18.x
          apk add "asterisk@andrius-asterisk=~16"      # 16.x
          apk add "asterisk@andrius-asterisk=~1.8"     # 1.8
          apk add "asterisk@andrius-asterisk=~1.6"     # 1.6</pre>
          <p>The <b>git</b> line is a build of Asterisk <code>master</code> (a
          development snapshot, may be unstable). It sorts highest, so an
          unpinned install gets it - pin a version above for a release:</p>
          <pre>apk add asterisk@andrius-asterisk          # git (master) snapshot</pre>
          <p>Why the pin tag matters and per-line details:
          <a href="https://github.com/andrius/asterisk-alpine#avoiding-conflicts-with-alpines-asterisk">README</a>.</p>
          HTML
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v5
