name: discover-releases

# Daily: scrape downloads.asterisk.org for new Asterisk releases on the tracked
# lines, and when any are found, bump pkgver + regenerate sha512sums (abuild
# checksum) and open/update one consolidated PR (asterisk-new-releases). No PR
# when nothing changed upstream. Implements #6.

on:
  schedule:
    - cron: "37 21 * * *"   # daily ~21:37 UTC, off the round hour
  workflow_dispatch:

permissions:
  contents: write   # commit the bumps + push the PR branch

concurrency:
  group: discover-releases
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
      ABUILD_KEY_NAME: ${{ secrets.ABUILD_KEY_NAME }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Install signing key (abuild env)
        run: ./scripts/ci-install-signing-key.sh

      - name: Discover new upstream releases
        id: disc
        run: |
          ./scripts/discover-releases.sh 2>/dev/null > /tmp/bumps.tsv || true
          if [ -s /tmp/bumps.tsv ]; then
            echo "has_bumps=true" >> "$GITHUB_OUTPUT"
            echo "::notice::discovered bumps:"; sed 's/^/  /' /tmp/bumps.tsv
          else
            echo "has_bumps=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no new upstream releases; nothing to do"
          fi

      - name: Apply bumps (pkgver + source + abuild checksum)
        if: steps.disc.outputs.has_bumps == 'true'
        run: |
          sudo chmod -R a+rwX packages repository keys
          while IFS="$(printf '\t')" read -r line cur new certN base; do
            [ -n "$line" ] || continue
            echo "=== $line: $cur -> $new (cert=$certN base=$base) ==="
            apk="packages/$line/APKBUILD"
            sed -i "s|^pkgver=.*|pkgver=$new|" "$apk"
            if [ "$line" = "22-cert" ]; then
              # certified: source filename + builddir embed "<base>-cert<cur_cert>"
              cur_cert=$(printf '%s' "$cur" | cut -d. -f4)
              sed -i "s|${base}-cert${cur_cert}|${base}-cert${certN}|g" "$apk"
            fi
            docker compose build "builder-$line"
            docker compose run --rm "builder-$line" sh -c 'abuild clean || true; abuild checksum'
          done < /tmp/bumps.tsv

      - name: Open / update the consolidated PR
        if: steps.disc.outputs.has_bumps == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          summary=$(awk -F'\t' '{ printf "%s: %s->%s; ", $1, $2, $3 }' /tmp/bumps.tsv)
          git checkout -B asterisk-new-releases
          git add packages/*/APKBUILD
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "Bump Asterisk releases ($summary)"
          git push --force-with-lease origin asterisk-new-releases
          # create the PR if it does not yet exist; a push updates an existing one
          gh pr create --title "Bump Asterisk releases" \
            --body "Auto-discovered upstream release bumps (via \`discover-releases.yml\`). Merge to rebuild + publish on the next run.

          Bumps: $(awk -F'\t' '{ printf "- **%s**: %s -> %s\n", $1, $2, $3 }' /tmp/bumps.tsv)" \
            --base main --head asterisk-new-releases || true
